name: Go Multi-Platform Release

on:
  push:
    branches: ["main"]

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || 'ubuntu-latest' }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
            binary_name: scorial
            zip_name: Scorial-linux-amd64.zip
          - os: linux
            arch: arm64
            binary_name: scorial
            zip_name: Scorial-linux-arm64.zip
          - os: windows
            arch: amd64
            binary_name: scorial.exe
            zip_name: Scorial-windows-amd64.zip
          - os: windows
            arch: arm64
            binary_name: scorial.exe
            zip_name: Scorial-windows-arm64.zip
          - os: darwin
            arch: amd64
            binary_name: scorial
            zip_name: Scorial-macos-amd64.zip
          - os: darwin
            arch: arm64
            binary_name: scorial
            zip_name: Scorial-macos-arm64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test -v ./...

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.os == 'darwin' && '1' || '0' }}
        run: go build -v -o ${{ matrix.binary_name }} ./cmd/app

      - name: Package into ZIP
        run: |
          # Create a staging directory
          mkdir package

          # Move the compiled binary
          mv ${{ matrix.binary_name }} package/

          # Copy the assets directory and config from the repo
          cp -r assets package/
          cp config.yaml package/

          # Create fresh, empty directories for runtime data
          mkdir package/databases
          mkdir package/certs

          # Zip the contents of the staging folder
          cd package
          zip -r ../${{ matrix.zip_name }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    needs: build_and_test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Delete Old Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Explicitly passing the repository fixes the silent failure
        run: gh release delete latest --cleanup-tag -y --repo ${{ github.repository }} || true

      - name: Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Scorial Latest Release
          body: "Automated rolling release containing the latest compiled binaries and default directory structures."
          files: ./dist/*.zip
          prerelease: false
          make_latest: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
